steps:
  # Step 1: 종속성 설치
  - name: 'gcr.io/cloud-builders/npm'
    dir: 'api'
    args: ['install', '--production']
    id: 'install-dependencies'

  # Step 2: 린트 (선택사항)
  - name: 'gcr.io/cloud-builders/npm'
    dir: 'api'
    args: ['run', 'lint']
    id: 'lint'
    onFailure: ['CONTINUE']

  # Step 3: 테스트 (선택사항, 아직 테스트 없음)
  - name: 'gcr.io/cloud-builders/npm'
    dir: 'api'
    args: ['test', '--', '--passWithNoTests']
    id: 'test'
    onFailure: ['CONTINUE']

  # Step 4: Docker 이미지 빌드
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/diamond-jewelry-api:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/diamond-jewelry-api:latest'
      - '.'
    id: 'build-image'

  # Step 5: Docker 레지스트리로 푸시
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/diamond-jewelry-api:$SHORT_SHA'
    id: 'push-image'

  # Step 6: Cloud Run에 배포
  - name: 'gcr.io/cloud-builders/run'
    args:
      - 'deploy'
      - 'diamond-jewelry-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/diamond-jewelry-api:$SHORT_SHA'
      - '--region'
      - 'asia-northeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    id: 'deploy'

# 이미지 저장
images:
  - 'gcr.io/$PROJECT_ID/diamond-jewelry-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/diamond-jewelry-api:latest'

# 빌드 옵션
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'N1_HIGHCPU_8'

# 환경 변수 (GCP Console에서 설정 필요)
substitutions:
  _REGION: 'asia-northeast1'
  _SERVICE_NAME: 'diamond-jewelry-api'
  _DEPLOY_TIMEOUT: '900s'

# 타임아웃
timeout: '1200s'
